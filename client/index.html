<!-- Document type declaration -->
<!DOCTYPE html>
<!-- Main HTML element with language attribute -->
<html lang="en">
<!-- Head section containing metadata and external resources -->
<head>
  <!-- Character encoding for the document -->
  <meta charset="UTF-8" />
  <!-- Responsive viewport settings -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Page title -->
  <title>NexusTraffic | Login</title>
  
  <!-- Preconnect to Google Fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Main typography fonts from Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Figtree:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <!-- Material Symbols for icons -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0"
    rel="stylesheet"
  />
  <!-- Link to external authentication CSS -->
  <link rel="stylesheet" href="css/auth/login.css" />
</head>
<!-- Body section where the visible content resides -->
<body>
  <!-- Main container for authentication screens -->
  <main class="auth-shell">
    <!-- Card component for the login form -->
    <section class="auth-card" aria-label="Login form">
      <!-- Branding block containing logo and application title -->
      <div class="brand-block">
        <!-- Application icon -->
        <span class="material-symbols-outlined brand-icon" aria-hidden="true">traffic</span>
        <!-- Primary application name -->
        <h1>NEXUSTRAFFIC</h1>
        <!-- Subtitle or description of the system -->
        <p>Traffic &amp; Accident Management System</p>
      </div>

      <!-- Authentication form for user login -->
      <form class="auth-form" action="#" method="post">
        <!-- Email input field wrapper -->
        <div class="field-wrap">
          <!-- Label for email input -->
          <label for="email">Email</label>
          <!-- Email input element -->
          <input id="email" name="email" type="email" placeholder="Enter your email" required />
        </div>

        <!-- Password input field wrapper -->
        <div class="field-wrap">
          <!-- Label for password input -->
          <label for="password">Password</label>
          <!-- Wrapper for password input and show/hide action -->
          <div class="input-with-action">
            <!-- Password input element -->
            <input id="password" name="password" type="password" placeholder="Enter your password" required />
            <!-- Toggle button to show or hide the password text -->
            <button class="inline-action" type="button" data-toggle="#password">
              <!-- Visibility icon -->
              <span class="material-symbols-outlined">visibility</span>
              Show
            </button>
          </div>
        </div>

        <!-- Row containing auxiliary login options like Remember Me and Forgot Password -->
        <div class="meta-row">
          <!-- Wrapper for the remember me checkbox -->
          <label class="remember-wrap">
            <!-- Checkbox for session persistence -->
            <input type="checkbox" id="remember" checked />
            <!-- Label text for the checkbox -->
            <span>Remember me</span>
          </label>
          <!-- Link to password recovery page -->
          <a href="#">Forgot your password?</a>
        </div>

        <!-- Primary submission button for the login form -->
        <button class="primary-btn" type="submit">Login</button>

        <!-- Link to switch to the registration page -->
        <p class="switch-copy">
          Don't have an account?
          <a href="pages/register.html">Register</a>
        </p>
      </form>
    </section>
  </main>

  <!-- Core application logic script -->
  <script src="js/app.js"></script>
  <!-- Login-specific functionality script -->
  <script src="js/login.js"></script>
  <!-- Inline script for interactive UI elements on the login page -->
  <script>
    // Select all buttons with data-toggle attribute and attach click event listeners
    document.querySelectorAll("[data-toggle]").forEach((button) => {
      button.addEventListener("click", () => {
        // Find the target input element associated with the button
        const target = document.querySelector(button.dataset.toggle);
        // Check if the current type is password to determine toggle action
        const isHidden = target.type === "password";
        // Toggle the input type between text and password
        target.type = isHidden ? "text" : "password";
        // Update the icon to reflect the current visibility state
        button.querySelector(".material-symbols-outlined").textContent = isHidden ? "visibility_off" : "visibility";
        // Update the button text to 'Hide' or 'Show'
        button.lastChild.textContent = isHidden ? " Hide" : " Show";
      });
    });
  </script>
</body>
</html>
